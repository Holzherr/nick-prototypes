<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prototype context</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .topbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #e2e8f0; background: white; font-size: 12px; }
  .topbar a { color: #475569; text-decoration: none; }
  .topbar a:hover { color: #0f172a; }
  .md { max-width: 760px; margin: 0 auto; padding: 32px 32px 80px; line-height: 1.65; color: #1e293b; }
  .md h1 { font-size: 1.875rem; font-weight: 700; margin: 0 0 0.5rem; color: #0f172a; }
  .md h2 { font-size: 1.375rem; font-weight: 600; margin: 2.25rem 0 0.75rem; color: #0f172a; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.35rem; }
  .md h3 { font-size: 1.125rem; font-weight: 600; margin: 1.75rem 0 0.5rem; color: #1e293b; }
  .md h4 { font-size: 1rem; font-weight: 600; margin: 1.25rem 0 0.4rem; }
  .md p { margin: 0.75rem 0; }
  .md ul, .md ol { margin: 0.5rem 0 0.75rem 1.4rem; }
  .md li { margin: 0.3rem 0; }
  .md li > p { margin: 0.25rem 0; }
  .md code { background: #f1f5f9; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875em; font-family: "SF Mono", Menlo, monospace; }
  .md pre { background: #0f172a; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; }
  .md pre code { background: transparent; padding: 0; color: inherit; }
  .md blockquote { border-left: 3px solid #cbd5e1; padding: 0.25rem 1rem; color: #475569; margin: 1rem 0; background: #f8fafc; border-radius: 0 0.5rem 0.5rem 0; }
  .md table { border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
  .md th, .md td { border: 1px solid #e2e8f0; padding: 0.5rem 0.75rem; text-align: left; vertical-align: top; }
  .md th { background: #f8fafc; font-weight: 600; }
  .md a { color: #2563eb; text-decoration: underline; }
  .md a:hover { color: #1d4ed8; }
  .md hr { border: none; border-top: 1px solid #e2e8f0; margin: 2rem 0; }
  .md strong { color: #0f172a; }
</style>
</head>
<body class="bg-slate-50 text-slate-900">

<div class="topbar">
  <a href="./index.html">← All prototypes</a>
  <span class="text-slate-300">/</span>
  <span id="crumb" class="text-slate-900 font-medium"></span>
</div>

<main class="md" id="md"></main>

<script>
const params = new URLSearchParams(location.search);
const path = params.get('path');
const md = document.getElementById('md');

if (!path) {
  md.innerHTML = '<h1>No file specified</h1><p>Add <code>?path=&lt;relative-path-to-md&gt;</code> to the URL.</p>';
} else {
  document.getElementById('crumb').textContent = path;
  fetch(path)
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(text => {
      md.innerHTML = marked.parse(text);
      // Rewrite relative URLs in the rendered markdown so they resolve from the file's directory, not from this viewer
      const dir = path.replace(/[^/]*$/, '');
      md.querySelectorAll('a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (/^(https?:\/\/|\/|mailto:|#)/.test(href)) return;
        a.setAttribute('href', dir + href);
      });
    })
    .catch(err => {
      md.innerHTML = `<h1>Couldn't load ${path}</h1><p class="text-red-600">${err.message}</p>`;
    });
}
</script>

</body>
</html>
