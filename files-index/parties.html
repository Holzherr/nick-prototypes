<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitLaw — Parties</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

<body data-page="parties">
<div class="app">
  <aside class="sidebar">
    <button class="side-icon" title="Settings"><i class="ti ti-settings"></i></button>
    <button class="side-icon" title="New"><i class="ti ti-plus"></i></button>
    <button class="side-icon" title="Search"><i class="ti ti-search"></i></button>
    <a class="side-icon" href="overview.html" title="Files"><i class="ti ti-folder"></i></a>
    <button class="side-icon active" title="Parties"><i class="ti ti-users"></i></button>
    <a class="side-icon" href="knowledge.html" title="Knowledge"><i class="ti ti-books"></i></a>
    <button class="side-icon" title="Notifications"><i class="ti ti-bell"></i><span class="dot">3</span></button>

          <button class="icon-btn" title="View"><i class="ti ti-layout-grid"></i></button>
          <button class="icon-btn" title="Add"><i class="ti ti-plus"></i></button>

<script src="data.js"></script>
<script src="pages.js"></script>
