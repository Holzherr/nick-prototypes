<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;width:280px;margin:0;padding:16px;color:#0f172a}
  h1{font-size:15px;margin:0 0 2px;display:flex;align-items:center;gap:7px}
  .dot{width:13px;height:13px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#6366f1,#4f46e5)}
  p{font-size:12px;color:#64748b;margin:0 0 12px;line-height:1.4}
  button{width:100%;padding:10px;border:0;border-radius:9px;background:#4f46e5;color:#fff;font-weight:600;font-size:13px;cursor:pointer}
  button:hover{background:#4338ca}
  .row{display:flex;gap:8px;margin-top:8px}
  .row label{font-size:11px;color:#64748b;display:flex;align-items:center;gap:5px}
  input{width:100%;font-size:11px;padding:6px;border:1px solid #e2e8f0;border-radius:6px;margin-top:8px}
  .status{font-size:11px;color:#64748b;margin-top:10px;min-height:14px}
</style></head>
<body>
  <h1><span class="dot"></span> Pinpoint</h1>
  <p>Freeze this page as-you-see-it and open it in the annotator. Element-anchored, agent-ready.</p>
  <button id="cap">📸 Capture &amp; annotate this page</button>
  <input id="viewer" value="https://holzherr.github.io/nick-prototypes/visual-feedback/app.html" />
  <div class="status" id="status"></div>
  <script src="lib/lz-string.min.js"></script>
  <script src="popup.js"></script>
</body></html>
