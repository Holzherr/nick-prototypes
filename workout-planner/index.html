<script>
// ============================================================
// Constants + Storage keys
// ============================================================
const TODAY = '2026-05-19';
const LS = {
  overrides: 'workout-planner-v2',
  habits:    'workout-planner-habits-v2',
  goals:     'workout-planner-goals-v2',
  cloud:     'workout-planner-cloud-v2',
};

// ============================================================
// State
// ============================================================
function loadJSON(key, fallback) {
  try { return JSON.parse(localStorage.getItem(key)) || fallback; }
  catch { return fallback; }
}

const state = {
  view: 'workouts',
  workoutsTab: 'upcoming',
  selectedWorkoutId: null,
  workouts: window.SEED_WORKOUTS.map(w => ({ ...w, exercises: w.exercises.map(e => ({ ...e })) })),
  overrides: loadJSON(LS.overrides, {}),  // { [workoutId]: { completed, exercises: { [label]: { results, notes } }, comments: [] } }
  habits:    loadJSON(LS.habits, {}),
  goals:     { ...window.SEED_GOALS, ...loadJSON(LS.goals, {}) },
  cloud:     loadJSON(LS.cloud, { enabled: false, url: '', anonKey: '', userEmail: '', lastSync: null, status: 'local' }),
  habitDate: '2026-05-18',
  modal: null,
};

function persist(key, value) { localStorage.setItem(key, JSON.stringify(value)); scheduleCloudSync(); }
function saveOverrides() { persist(LS.overrides, state.overrides); }
function saveHabits()    { persist(LS.habits,    state.habits);    }
function saveGoals()     { persist(LS.goals,     state.goals);     }
function saveCloud()     { localStorage.setItem(LS.cloud, JSON.stringify(state.cloud)); /* no recursive sync */ }

function effectiveWorkout(w) {
  const o = state.overrides[w.id];
  if (!o) return { ...w, comments: [] };
  const merged = { ...w };
  if (typeof o.completed === 'boolean') merged.completed = o.completed;
  if (o.exercises) {
    merged.exercises = w.exercises.map(ex => {
      const eo = o.exercises[ex.label];
      if (!eo) return ex;
      return { ...ex, results: eo.results !== undefined ? eo.results : ex.results, notes: eo.notes };
    });
  }
  merged.comments = o.comments || [];
  return merged;
}

function getWorkoutById(id) {
  const w = state.workouts.find(x => x.id === id);
  return w ? effectiveWorkout(w) : null;
}

function setOverride(workoutId, mutator) {
  const cur = state.overrides[workoutId] || { exercises: {}, comments: [] };
  mutator(cur);
  state.overrides[workoutId] = cur;
  saveOverrides();
}

// ============================================================
// Prescription parser + Suggestion engine
// ============================================================
function parseInstructions(text) {
  // Each line like "NxM" or "NxM /Yrpe" or "NxM each side" or "NxM /Y/Zrpe"
  return text.split('\n').filter(Boolean).flatMap(line => {
    const m = line.match(/^(\d+)x(\d+)/);
    if (!m) return [{ targetReps: null, targetRpe: null, raw: line.trim() }];
    const nSets = parseInt(m[1], 10);
    const reps = parseInt(m[2], 10);
    const rpeMatch = line.match(/\/([\d.]+)(?:\/[\d.]+)?rpe/i);
    const rpe = rpeMatch ? parseFloat(rpeMatch[1]) : null;
    const note = line.replace(/^\d+x\d+\s*/, '').replace(/\/[\d.]+(?:\/[\d.]+)?rpe/i, '').trim() || null;
    return Array(nSets).fill().map(() => ({ targetReps: reps, targetRpe: rpe, note }));
  });
}

function bumpFor(name) {
  const n = name.toLowerCase();
  if (n.includes('deadlift'))                                                     return 5;
  if (n.includes('squat'))                                                        return 2.5;
  if (n.includes('bench') || n.includes('overhead press') || n.includes('row'))   return 2.5;
  if (n.includes('pull down') || n.includes('pulldown'))                          return 2.5;
  if (n.includes('rdl') || n.includes('split squat'))                             return 2;
  if (n.includes('face pull') || n.includes('lat raise') || n.includes('side bend')) return 1;
  return 2.5;
}

function findLastSession(exerciseName, beforeDate) {
  const past = state.workouts
    .map(effectiveWorkout)
    .filter(w => w.date < beforeDate && w.exercises.some(e => e.name === exerciseName && Array.isArray(e.results) && e.results.length > 0))
    .sort((a,b) => b.date.localeCompare(a.date));
  if (!past.length) return null;
  const w = past[0];
  return { workout: w, exercise: w.exercises.find(e => e.name === exerciseName) };
}

// Build per-set suggestions for an exercise on a given workout.
// Returns an array aligned with the parsed instructions, each entry:
//   { targetReps, targetRpe, note, suggestedWeight, lastSet }
function suggestSets(workout, exercise) {
  const targets = parseInstructions(exercise.instructions);
  const last = findLastSession(exercise.name, workout.date);
  const goal = state.goals[exercise.name];

  return targets.map((t, i) => {
    if (!last) return { ...t, suggestedWeight: null, lastSet: null };
    const lastSet = last.exercise.results[i] || last.exercise.results[last.exercise.results.length - 1];
    if (!lastSet || lastSet.weight == null) return { ...t, suggestedWeight: null, lastSet };

    let suggested = lastSet.weight;
    const bump = bumpFor(exercise.name);

    // Always trend up a touch on the same RPE — the "small iteration" lift week-to-week.
    // Bigger jumps when last session left obvious headroom; smaller when last was at or above target.
    if (lastSet.rpe != null && t.targetRpe != null) {
      if (t.targetRpe - lastSet.rpe >= 1)        suggested = lastSet.weight + bump;
      else if (t.targetRpe - lastSet.rpe >= 0.5) suggested = lastSet.weight + bump * 0.75;
      else if (t.targetRpe - lastSet.rpe >= 0)   suggested = lastSet.weight + bump * 0.5;
      else                                       suggested = lastSet.weight; // last was harder than target — hold
    } else {
      suggested = lastSet.weight + bump * 0.5;
    }
    // Round to plausible plate increment.
    const inc = bump >= 5 ? 2.5 : (bump >= 2.5 ? 1.25 : 0.5);
    suggested = Math.round(suggested / inc) * inc;

    return { ...t, suggestedWeight: suggested, lastSet };
  });
}

function bestEverForExercise(exerciseName) {
  let best = null;
  for (const w of state.workouts.map(effectiveWorkout)) {
    const ex = w.exercises.find(e => e.name === exerciseName);
    if (!ex || !Array.isArray(ex.results)) continue;
    for (const s of ex.results) {
      if (s && s.weight != null && (!best || s.weight > best.weight)) {
        best = { weight: s.weight, reps: s.reps, date: w.date };
      }
    }
  }
  return best;
}

// ============================================================
// Display helpers
// ============================================================
function formatResultsCompact(arr) {
  if (!Array.isArray(arr) || arr.length === 0) return '';
  return arr.map(s => {
    if (s.weight == null && s.reps == null) return '—';
    const w = s.weight != null ? `${s.weight}` : '?';
    const r = s.reps   != null ? `×${s.reps}` : '';
    return `${w}${r}`;
  }).join(' · ');
}

function formatResultsList(arr) {
  if (!Array.isArray(arr) || arr.length === 0) return '';
  return arr.map((s, i) => {
    const w = s.weight != null ? `${s.weight} kg` : '—';
    const r = s.reps   != null ? `${s.reps} reps` : '';
    const rpe = s.rpe  != null ? ` @ ${s.rpe} RPE` : '';
    return `Set ${i+1}: ${w} × ${r}${rpe}`;
  }).join('\n');
}

function isResultsEmpty(r) {
  if (!Array.isArray(r)) return true;
  return r.length === 0 || r.every(s => s == null || (s.weight == null && s.reps == null));
}

// ============================================================
// Cloud sync (Supabase REST)
// ============================================================
let _syncTimer = null;
function scheduleCloudSync() {
  if (!state.cloud.enabled) return;
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => doCloudSync('push').catch(()=>{}), 800);
}

async function doCloudSync(direction) {
  const { url, anonKey, userEmail } = state.cloud;
  if (!url || !anonKey || !userEmail) throw new Error('Cloud sync not configured');
  state.cloud.status = 'syncing'; renderSyncIndicator();

  const endpoint = `${url.replace(/\/$/, '')}/rest/v1/workout_data`;
  const headers = {
    'apikey': anonKey,
    'Authorization': `Bearer ${anonKey}`,
    'Content-Type': 'application/json',
    'Prefer': 'resolution=merge-duplicates,return=representation',
  };

  try {
    if (direction === 'push') {
      const payload = { overrides: state.overrides, habits: state.habits, goals: state.goals };
      const body = JSON.stringify({ user_email: userEmail, payload, updated_at: new Date().toISOString() });
      const r = await fetch(endpoint, { method: 'POST', headers, body });
      if (!r.ok) throw new Error(`Push failed: ${r.status} ${await r.text()}`);
    } else if (direction === 'pull') {
      const r = await fetch(`${endpoint}?user_email=eq.${encodeURIComponent(userEmail)}&select=payload,updated_at`, { headers });
      if (!r.ok) throw new Error(`Pull failed: ${r.status} ${await r.text()}`);
      const rows = await r.json();
      if (rows.length > 0 && rows[0].payload) {
        const p = rows[0].payload;
        if (p.overrides) { state.overrides = p.overrides; localStorage.setItem(LS.overrides, JSON.stringify(p.overrides)); }
        if (p.habits)    { state.habits    = p.habits;    localStorage.setItem(LS.habits,    JSON.stringify(p.habits));    }
        if (p.goals)     { state.goals     = p.goals;     localStorage.setItem(LS.goals,     JSON.stringify(p.goals));     }
      }
    }
    state.cloud.status = 'ok';
    state.cloud.lastSync = new Date().toISOString();
    saveCloud();
  } catch (e) {
    state.cloud.status = 'err';
    state.cloud.lastError = String(e.message || e);
    saveCloud();
    throw e;
  } finally {
    renderSyncIndicator();
  }
}

function renderSyncIndicator() {
  const el = document.getElementById('sync-dot');
  if (!el) return;
  el.className = `sync-dot ${state.cloud.status || 'local'}`;
  const lbl = document.getElementById('sync-label');
  if (lbl) lbl.textContent = ({ ok: 'Synced', local: 'Local only', syncing: 'Syncing…', err: 'Sync error' })[state.cloud.status || 'local'];
}

// ============================================================
// Rendering
// ============================================================
const $app = document.getElementById('app');
const $modal = document.getElementById('modal-root');

function render() {
  if (state.view === 'workouts' && state.selectedWorkoutId) renderWorkoutDetail();
  else if (state.view === 'workouts') renderWorkoutsList();
  else if (state.view === 'habits')   renderHabits();
  else if (state.view === 'messages') renderMessages();
  else if (state.view === 'account')  renderAccount();
  else if (state.view === 'goals')    renderGoals();
  else if (state.view === 'cloud')    renderCloudSync();
  renderModal();
}

function bottomNav(active) {
  const tab = (key, icon, label) => `
    <button data-nav="${key}" class="flex flex-col items-center gap-0.5 ${active === key ? 'text-slate-900' : 'text-slate-500'} flex-1 py-2 ${active === key ? 'bg-slate-100 rounded-2xl mx-1' : ''}">
      ${icon}
      <span class="text-[10px] font-medium">${label}</span>

function workoutCard(w, isUpcoming) {
  const dateLabel = w.longDate;
  const checkClasses = w.completed
    ? 'bg-emerald-500 text-white border-emerald-500'
    : 'bg-white text-slate-300 border-slate-200';

  // For upcoming workouts, compute suggested top-set summary per exercise.
  const exerciseRows = [
    `<div class="flex items-center gap-3 py-1.5"><span class="ex-badge bg-orange-50">${icons.flame}</span><span class="text-slate-700 text-[15px]">Warm up</span></div>`,
    ...w.exercises.map(ex => {
      let suggestion = '';
      if (isUpcoming) {
        const sets = suggestSets(w, ex);
        const weights = sets.map(s => s.suggestedWeight).filter(x => x != null);
        if (weights.length) {
          const top = Math.max(...weights);
          suggestion = `<span class="ml-auto text-[12px] text-slate-500 font-medium whitespace-nowrap">→ ${top}kg</span>`;
        } else {
          suggestion = `<span class="ml-auto text-[11px] text-slate-400 whitespace-nowrap">new lift</span>`;
        }
      } else {
        // past: show summary of logged top weight if any
        if (Array.isArray(ex.results) && ex.results.length) {
          const top = ex.results.reduce((m, s) => s && s.weight != null && s.weight > m ? s.weight : m, 0);
          if (top > 0) suggestion = `<span class="ml-auto text-[12px] text-slate-500 font-medium whitespace-nowrap">${top}kg</span>`;
        }
      }
      return `<div class="flex items-center gap-3 py-1.5">
        <span class="ex-badge">${ex.label}</span>
        <span class="text-slate-700 text-[15px] truncate">${ex.name.replace(/^ISSA Exercise Library /, '')}</span>
        ${suggestion}
      </div>`;
    })
  ].join('');

  return `
    <button data-workout="${w.id}" class="block w-full text-left bg-white border border-slate-200 rounded-2xl overflow-hidden hover:border-slate-300 transition">
      <div class="bg-slate-100/70 px-5 py-3.5 flex items-center justify-between border-b border-slate-200/70">
        <span class="text-[15px] text-slate-700">${dateLabel}</span>
        <span class="w-7 h-7 rounded-full border flex items-center justify-center ${checkClasses}">${icons.check}</span>
      </div>
      <div class="px-5 pt-3 pb-3">
        <div class="flex items-center justify-between mb-1">
          <h3 class="text-[17px] font-semibold text-slate-900">${w.name}</h3>
          ${isUpcoming ? `<span class="pill bg-orange-100 text-orange-700">${icons.trending} suggested</span>` : ''}
        </div>
        <div class="space-y-0">
          ${exerciseRows}
        </div>
      </div>
    </button>`;
}

function greeting() {

  if (h < 12) return 'Good morning';
  if (h < 18) return 'Good afternoon';

function exerciseCard(w, ex) {
  const isSuper = ex.type === 'superset';
  const groupBadge = isSuper ? 'SUPERSET' : 'SINGLE';
  const ytSearch = `https://www.youtube.com/results?search_query=${encodeURIComponent(ex.search || ex.name)}`;
  const hasResults = !isResultsEmpty(ex.results);
  const checkBadge = hasResults
    ? `<span class="inline-flex items-center justify-center w-6 h-6 rounded-full bg-emerald-500 text-white">${icons.check}</span>`
    : `<span class="inline-flex items-center justify-center w-6 h-6 rounded-full border border-slate-300 text-slate-300">${icons.check}</span>`;

  const isUpcoming = w.date >= TODAY;
  const goal = state.goals[ex.name];
  const sets = suggestSets(w, ex);
  const best = bestEverForExercise(ex.name);

  // Suggestion block
  let suggestionBlock = '';
  if (isUpcoming && sets.some(s => s.suggestedWeight != null)) {
    const suggestedLine = sets.map(s =>
      s.suggestedWeight != null ? `<span class="font-semibold text-slate-900">${s.suggestedWeight}kg</span>×${s.targetReps || '—'}` : '—'
    ).join(' <span class="text-slate-300">·</span> ');
    const lastLine = sets[0] && sets[0].lastSet
      ? `<div class="text-[11px] text-slate-500 mt-1">Last time: ${formatResultsCompact(sets.map(s => s.lastSet).filter(Boolean))}</div>` : '';
    suggestionBlock = `
      <div class="bg-orange-50/70 border border-orange-200/60 rounded-xl px-3 py-2.5">
        <div class="flex items-center gap-1.5 text-[11px] font-semibold uppercase tracking-wider text-orange-700 mb-1">
          ${icons.trending}<span>Suggested today</span>
        </div>
        <div class="text-[13px] text-slate-700">${suggestedLine}</div>
        ${lastLine}
      </div>`;
  }

  // Goal block
  let goalBlock = '';
  if (goal) {
    const pct = best && goal.targetWeight ? Math.min(100, Math.round((best.weight / goal.targetWeight) * 100)) : 0;
    goalBlock = `
      <button data-set-goal="${escapeAttr(ex.name)}" class="w-full bg-emerald-50/70 border border-emerald-200/60 rounded-xl px-3 py-2.5 text-left hover:border-emerald-300">
        <div class="flex items-center gap-1.5 text-[11px] font-semibold uppercase tracking-wider text-emerald-700 mb-1">
          ${icons.target}<span>Goal</span>
        </div>
        <div class="text-[13px] text-slate-800"><span class="font-semibold">${goal.targetWeight ?? '—'} kg</span>${goal.targetReps ? ` × ${goal.targetReps}` : ''}${goal.note ? ` <span class="text-slate-500">— ${escapeHtml(goal.note)}</span>` : ''}</div>
        ${best ? `
          <div class="mt-1.5">
            <div class="flex items-center justify-between text-[11px] text-slate-500 mb-0.5">
              <span>Best: ${best.weight}kg × ${best.reps}</span>
              <span>${pct}%</span>
            </div>
            <div class="w-full bg-white rounded-full h-1.5 overflow-hidden"><div class="bg-emerald-500 h-full" style="width:${pct}%"></div></div>
          </div>` : ''}
      </button>`;
  } else if (isUpcoming) {
    goalBlock = `<button data-set-goal="${escapeAttr(ex.name)}" class="w-full text-left text-[12px] text-slate-500 hover:text-slate-800 py-1.5 px-3 border border-dashed border-slate-200 rounded-lg flex items-center gap-1.5">${icons.plus} Set a goal for this exercise</button>`;
  }

  return `
    <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden">
      <div class="bg-slate-100/70 px-4 py-2.5 flex items-center justify-between border-b border-slate-200/70">
        <span class="inline-block bg-white text-slate-700 text-[11px] font-semibold tracking-wider px-2.5 py-1 rounded">${groupBadge}</span>
        <span class="text-slate-600 font-semibold text-[15px]">${ex.label}</span>
        ${checkBadge}
      </div>
      <div class="p-4 space-y-3">
        <h4 class="font-semibold text-slate-900 text-[17px] leading-snug">${ex.name}</h4>

        <a href="${ytSearch}" target="_blank" rel="noopener" class="block">
          <div class="yt-card">
            <div class="absolute top-2 left-2 right-2 flex items-center gap-2 text-white">
              <div class="w-7 h-7 rounded-full bg-white/95 flex items-center justify-center">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="#cc0000"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </div>
              <div class="min-w-0 flex-1">
                <div class="text-[12px] font-semibold truncate">${ex.name}</div>
                <div class="text-[10px] text-white/75">YouTube tutorial</div>
              </div>
            </div>
            <div class="yt-play"><svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg></div>
            <div class="absolute bottom-2 right-2 text-white text-[11px] flex items-center gap-1 bg-black/40 px-2 py-1 rounded">Watch on YouTube</div>
          </div>
        </a>

        <div class="pt-1">
          <h5 class="font-semibold text-slate-900 mb-1">Instructions</h5>
          <pre class="text-[14px] text-slate-700 leading-relaxed whitespace-pre-wrap font-sans">${ex.instructions}</pre>
        </div>

        ${suggestionBlock}
        ${goalBlock}

        ${hasResults ? `
          <div class="pt-1">
            <h5 class="font-semibold text-slate-900 mb-1">Results</h5>
            <pre class="text-[14px] text-slate-700 leading-relaxed whitespace-pre-wrap font-sans">${formatResultsList(ex.results)}</pre>
            ${ex.notes ? `<div class="text-[13px] text-slate-500 mt-1">Notes: ${escapeHtml(ex.notes)}</div>` : ''}
          </div>
        ` : ''}

        <button data-add-result="${ex.label}" class="w-full ${hasResults ? 'border border-slate-800' : 'bg-slate-900 text-white border border-slate-900'} rounded-full py-2.5 text-[14px] font-medium ${hasResults ? 'text-slate-900' : ''} hover:opacity-90 transition">
          ${hasResults ? `Update results for ${ex.label}` : `Log results for ${ex.label}`}
        </button>

        <button data-history="${escapeAttr(ex.name)}" class="w-full flex items-center justify-center gap-1.5 text-slate-500 text-[13px] py-1 hover:text-slate-700">
          ${icons.history}<span>Exercise History</span>
        </button>
      </div>
    </div>`;
}

function timeAgo(iso) {
  if (!iso) return 'never';
  const s = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.round(s/60)}m ago`;
  if (s < 86400) return `${Math.round(s/3600)}h ago`;
  return `${Math.round(s/86400)}d ago`;
}

            <div class="space-y-2">${goaled.map(goalRow).join('')}</div>
          </div>` : `
          <div class="bg-white border border-slate-200 rounded-2xl p-6 text-center">
            <div class="text-slate-400 text-sm mb-2">No goals yet.</div>
            <div class="text-slate-500 text-[13px]">Tap a lift below to set one — e.g. "Back Squat 80kg × 5".</div>
          </div>`}

        <div>
          <h3 class="text-[12px] uppercase tracking-wider text-slate-500 font-semibold mb-2">Available lifts</h3>
          <div class="space-y-2">${ungoaled.map(n => goalSetButton(n)).join('')}</div>
        </div>
      </div>
    </div>`;

  document.querySelector('[data-back]').onclick = () => { state.view = 'account'; render(); };
  $app.querySelectorAll('[data-set-goal]').forEach(b => b.onclick = () => openModal({ kind: 'goal-edit', exerciseName: b.dataset.setGoal }));
}

function goalRow(name) {
  const g = state.goals[name];
  const best = bestEverForExercise(name);
  const pct = best && g.targetWeight ? Math.min(100, Math.round((best.weight / g.targetWeight) * 100)) : 0;
  return `
    <button data-set-goal="${escapeAttr(name)}" class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-left hover:border-slate-300 transition">
      <div class="flex items-start justify-between gap-2 mb-1.5">
        <span class="font-semibold text-slate-900 text-[15px] leading-snug">${name.replace(/^ISSA Exercise Library /, '')}</span>
        <span class="text-emerald-700 font-semibold text-[14px] whitespace-nowrap">${g.targetWeight ?? '—'} kg${g.targetReps ? ` × ${g.targetReps}` : ''}</span>
      </div>
      ${g.note ? `<div class="text-[12px] text-slate-500 mb-2">${escapeHtml(g.note)}</div>` : ''}
      <div class="flex items-center justify-between text-[11px] text-slate-500 mb-1">
        <span>${best ? `Best so far: ${best.weight}kg × ${best.reps} on ${best.date}` : 'No logged results yet'}</span>
        <span>${pct}%</span>
      </div>
      <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden"><div class="bg-emerald-500 h-full" style="width:${pct}%"></div></div>
    </button>`;
}

function goalSetButton(name) {
  return `
    <button data-set-goal="${escapeAttr(name)}" class="w-full bg-white border border-dashed border-slate-300 rounded-2xl p-3 text-left hover:border-slate-400 hover:bg-slate-50 transition">
      <div class="flex items-center justify-between">
        <span class="text-slate-700 text-[14px]">${name.replace(/^ISSA Exercise Library /, '')}</span>
        <span class="text-slate-400 text-[12px] flex items-center gap-1">${icons.plus} Set goal</span>
      </div>
    </button>`;
}

  $app.innerHTML = `

        </div>
      </header>
      <div class="flex-1 px-4 py-4 space-y-4 scroll-area overflow-y-auto pb-8">

        <div class="bg-white border border-slate-200 rounded-2xl p-5">

            <div>
              <h3 class="font-semibold text-slate-900">Status</h3>
              <p class="text-[12px] text-slate-500 mt-0.5">${c.enabled ? ({ ok:'Synced to Supabase', local:'Configured but never synced', syncing:'Syncing…', err:`Error: ${c.lastError || 'unknown'}` })[c.status || 'local'] : 'Disabled — data stays on this device only'}</p>
            </div>
            <span class="sync-dot ${c.status || 'local'}"></span>

          <p class="text-[12px] text-slate-500">Paste your Supabase project's URL and anon key. Data syncs to a single <code class="bg-slate-100 px-1 rounded">workout_data</code> row keyed by your email.</p>
          <label class="block">
            <span class="text-[12px] font-semibold text-slate-700">Project URL</span>
            <input id="cloud-url" type="url" value="${escapeAttr(c.url || '')}" placeholder="https://xxx.supabase.co" class="set-input mt-1 text-left" />
          </label>
          <label class="block">
            <span class="text-[12px] font-semibold text-slate-700">Anon key</span>
            <textarea id="cloud-key" rows="3" placeholder="eyJhbGciOi…" class="w-full p-2 border border-slate-200 rounded-lg text-[12px] font-mono mt-1 focus:outline-none focus:border-orange-400">${escapeHtml(c.anonKey || '')}</textarea>
          </label>
          <label class="block">
            <span class="text-[12px] font-semibold text-slate-700">Your email (row key)</span>
            <input id="cloud-email" type="email" value="${escapeAttr(c.userEmail || '')}" placeholder="you@example.com" class="set-input mt-1 text-left" />

        </form>

        <details class="bg-white border border-slate-200 rounded-2xl p-5">
          <summary class="font-semibold text-slate-900 cursor-pointer">One-time Supabase setup (60 sec)</summary>
          <ol class="text-[13px] text-slate-700 leading-relaxed list-decimal pl-5 space-y-1.5 mt-3">
            <li>Create a free project at <a href="https://supabase.com" target="_blank" class="text-orange-700 underline">supabase.com</a>.</li>
            <li>Open the SQL editor and run the snippet below.</li>

  updated_at  timestamptz not null default now()
);

-- Prototype-grade open access. Tighten with RLS + auth for production.
alter table workout_data enable row level security;
create policy "anon all" on workout_data
  for all using (true) with check (true);</pre>
          <p class="text-[12px] text-slate-500 mt-2">The anon key is safe to embed client-side. The RLS policy here is wide-open — fine for a personal prototype, but tighten before sharing the URL with anyone else.</p>

    msg.className = 'text-[12px] mt-1 text-emerald-700';
    if (state.cloud.enabled) doCloudSync('push').then(() => render()).catch(err => { msg.textContent = String(err.message); msg.className = 'text-[12px] mt-1 text-rose-600'; render(); });
  };

  document.getElementById('cloud-test').onclick = async () => {
    const url       = document.getElementById('cloud-url').value.trim();
    const anonKey   = document.getElementById('cloud-key').value.trim();

    msg.textContent = 'Testing…';
    msg.className = 'text-[12px] mt-1 text-slate-500';
    try {
      const r = await fetch(`${url.replace(/\/$/, '')}/rest/v1/workout_data?select=user_email&limit=1`, {
        headers: { apikey: anonKey, Authorization: `Bearer ${anonKey}` }
      });
      if (r.ok) { msg.textContent = '✓ Connection works.'; msg.className = 'text-[12px] mt-1 text-emerald-700'; }
      else { msg.textContent = `✗ ${r.status} ${await r.text()}`; msg.className = 'text-[12px] mt-1 text-rose-600'; }
    } catch (err) { msg.textContent = `✗ ${err.message}`; msg.className = 'text-[12px] mt-1 text-rose-600'; }
  };

  const pullBtn = document.getElementById('pull-now');
  if (pullBtn) pullBtn.onclick = () => doCloudSync('pull').then(render).catch(e => { msg.textContent = String(e.message); msg.className = 'text-[12px] mt-1 text-rose-600'; });
  const pushBtn = document.getElementById('push-now');
  if (pushBtn) pushBtn.onclick = () => doCloudSync('push').then(render).catch(e => { msg.textContent = String(e.message); msg.className = 'text-[12px] mt-1 text-rose-600'; });
}

// ============================================================
// Modals + Sheets
// ============================================================
function openModal(m) { state.modal = m; renderModal(); }
function closeModal() { state.modal = null; renderModal(); }

function renderModal() {
  if (!state.modal) { $modal.innerHTML = ''; return; }
  if (state.modal.kind === 'history')    renderHistoryModal(state.modal.exercise);
  if (state.modal.kind === 'comments')   renderCommentsModal(state.modal.workoutId);
  if (state.modal.kind === 'results')    renderResultsSheet(state.modal.workoutId, state.modal.label);
  if (state.modal.kind === 'goal-edit')  renderGoalEditSheet(state.modal.exerciseName);
  if (state.modal.kind === 'habit-edit') renderHabitEditSheet(state.modal.key);
}

// ---- Inline Results sheet ----------------------------------
function renderResultsSheet(workoutId, label) {
  const w = getWorkoutById(workoutId);
  const ex = w.exercises.find(e => e.label === label);
  const sets = suggestSets(w, ex);
  const existing = Array.isArray(ex.results) ? ex.results : [];
  const isCompound = /squat|deadlift|bench|press|row|pull down|rdl/i.test(ex.name);

  const rows = sets.map((s, i) => {
    const cur = existing[i] || {};
    const weightVal   = cur.weight   != null ? cur.weight   : '';
    const repsVal     = cur.reps     != null ? cur.reps     : '';
    const rpeVal      = cur.rpe      != null ? cur.rpe      : '';
    const placeholderW = s.suggestedWeight != null ? s.suggestedWeight : '';
    const placeholderR = s.targetReps      != null ? s.targetReps      : '';
    const placeholderE = s.targetRpe       != null ? s.targetRpe       : '';
    return `
      <div class="grid grid-cols-12 gap-2 items-center">
        <div class="col-span-2 text-[12px] font-semibold text-slate-500 text-center">Set ${i+1}</div>
        <div class="col-span-3"><input data-set-w="${i}" inputmode="decimal" type="text" value="${weightVal}" placeholder="${placeholderW}" class="set-input" /></div>
        <div class="col-span-1 text-slate-400 text-center text-[14px]">kg</div>
        <div class="col-span-2"><input data-set-r="${i}" inputmode="numeric" type="text" value="${repsVal}" placeholder="${placeholderR}" class="set-input" /></div>
        <div class="col-span-1 text-slate-400 text-center text-[14px]">reps</div>
        <div class="col-span-2"><input data-set-e="${i}" inputmode="decimal" type="text" value="${rpeVal}" placeholder="${placeholderE}" class="set-input" /></div>
        <div class="col-span-1 text-slate-400 text-center text-[12px]">rpe</div>
      </div>`;
  }).join('');

  const lastRef = sets[0] && sets[0].lastSet
    ? `<div class="text-[11px] text-slate-500 mt-1">Last time: ${formatResultsCompact(sets.map(s => s.lastSet).filter(Boolean))}</div>`
    : '';

  $modal.innerHTML = `
    <div class="fixed inset-0 bg-black/40 modal-backdrop z-40 flex items-end md:items-center justify-center" data-close>
      <div class="sheet-panel bg-slate-50 w-full md:max-w-md md:rounded-2xl flex flex-col overflow-hidden" style="max-height: 92vh">
        <div class="bg-white px-4 pt-5 pb-4 border-b border-slate-200 flex items-start justify-between">
          <div class="flex-1 min-w-0">
            <div class="text-[11px] text-slate-500 uppercase tracking-wider font-semibold">${ex.label} · ${isCompound ? 'compound' : 'accessory'}</div>
            <h2 class="text-[17px] font-semibold text-slate-900 leading-snug mt-0.5">${ex.name}</h2>
            <div class="text-[12px] text-slate-500 mt-1">${ex.instructions.split('\n').join(' · ')}</div>
            ${lastRef}
          </div>
          <button data-close-btn class="text-slate-400 hover:text-slate-700 ml-2">${icons.close}</button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 py-4 space-y-2 scroll-area">
          ${rows}

          <button id="add-set" class="w-full mt-2 border border-dashed border-slate-300 rounded-xl py-2 text-[13px] text-slate-500 hover:border-slate-400 hover:text-slate-700 flex items-center justify-center gap-1.5">${icons.plus} Add another set</button>

          <div class="pt-3">
            <label class="text-[12px] font-semibold text-slate-700 block mb-1">Notes (optional)</label>
            <textarea id="ex-notes" rows="2" placeholder="Felt strong / right knee tight / dropped 2.5kg…" class="w-full p-2 border border-slate-200 rounded-lg text-[13px] focus:outline-none focus:border-orange-400">${escapeHtml(ex.notes || '')}</textarea>
          </div>
        </div>

        <div class="bg-white border-t border-slate-200 px-4 py-3 flex gap-2">
          ${!isResultsEmpty(ex.results) ? `<button id="clear-results" class="px-4 py-2.5 rounded-full text-rose-600 hover:bg-rose-50 text-[14px] font-medium">Clear</button>` : ''}
          <button data-close-btn class="flex-1 bg-slate-100 hover:bg-slate-200 rounded-full py-2.5 text-[14px] font-medium text-slate-700">Cancel</button>
          <button id="save-results" class="flex-1 bg-slate-900 hover:opacity-90 text-white rounded-full py-2.5 text-[14px] font-medium">Save</button>
        </div>
      </div>
    </div>`;

  let setCount = sets.length;
  $modal.querySelectorAll('[data-close-btn]').forEach(b => b.onclick = closeModal);
  $modal.querySelector('[data-close]').onclick = (e) => { if (e.target === e.currentTarget) closeModal(); };

  document.getElementById('add-set').onclick = () => {
    const cur = collectSheetSets(setCount);
    setOverride(w.id, o => {
      o.exercises = o.exercises || {};
      o.exercises[label] = { ...(o.exercises[label] || {}), results: cur.concat([{}]), notes: document.getElementById('ex-notes').value || undefined };
    });
    renderResultsSheet(workoutId, label);
  };

  document.getElementById('save-results').onclick = () => {
    const results = collectSheetSets(setCount);
    const notes = document.getElementById('ex-notes').value.trim();
    setOverride(w.id, o => {
      o.exercises = o.exercises || {};
      o.exercises[label] = { results, notes: notes || undefined };
    });
    closeModal();
    render();
  };

  const clearBtn = document.getElementById('clear-results');
  if (clearBtn) clearBtn.onclick = () => {
    setOverride(w.id, o => {
      if (o.exercises && o.exercises[label]) delete o.exercises[label];
    });
    closeModal();
    render();
  };

  function collectSheetSets(n) {
    const out = [];
    for (let i = 0; i < n; i++) {
      const wv = document.querySelector(`[data-set-w="${i}"]`)?.value.trim();
      const rv = document.querySelector(`[data-set-r="${i}"]`)?.value.trim();
      const ev = document.querySelector(`[data-set-e="${i}"]`)?.value.trim();
      if (!wv && !rv && !ev) { out.push({}); continue; }
      const s = {};
      if (wv) s.weight = parseFloat(wv);
      if (rv) s.reps   = parseInt(rv, 10);
      if (ev) s.rpe    = parseFloat(ev);
      out.push(s);
    }
    return out;
  }

  // Auto-focus first empty weight field.
  const firstEmpty = $modal.querySelector('input[data-set-w]:placeholder-shown') || $modal.querySelector('[data-set-w="0"]');
  if (firstEmpty) setTimeout(() => firstEmpty.focus(), 60);
}

      <div class="sheet-panel bg-slate-50 w-full md:max-w-md md:rounded-2xl flex flex-col overflow-hidden" style="max-height: 80vh">
        <div class="bg-white px-4 pt-5 pb-4 border-b border-slate-200 flex items-start justify-between">
          <div class="flex-1 min-w-0">
            <div class="text-[11px] text-emerald-700 uppercase tracking-wider font-semibold flex items-center gap-1">${icons.target} Goal</div>
            <h2 class="text-[17px] font-semibold text-slate-900 leading-snug mt-0.5">${exerciseName}</h2>
            ${best ? `<div class="text-[12px] text-slate-500 mt-1">Current best: ${best.weight}kg × ${best.reps}</div>` : ''}
          </div>
          <button data-close-btn class="text-slate-400 hover:text-slate-700 ml-2">${icons.close}</button>
        </div>

        <div class="flex-1 overflow-y-auto px-4 py-4 space-y-3 scroll-area">
          <div class="grid grid-cols-12 gap-2">
            <div class="col-span-5">
              <label class="text-[12px] font-semibold text-slate-700 block mb-1">Target weight</label>
              <div class="flex items-center gap-1.5"><input id="goal-w" inputmode="decimal" type="text" value="${g.targetWeight ?? ''}" placeholder="80" class="set-input" /><span class="text-slate-500 text-[13px]">kg</span></div>
            </div>
            <div class="col-span-4">
              <label class="text-[12px] font-semibold text-slate-700 block mb-1">Target reps</label>
              <div class="flex items-center gap-1.5"><input id="goal-r" inputmode="numeric" type="text" value="${g.targetReps ?? ''}" placeholder="5" class="set-input" /><span class="text-slate-500 text-[13px]">reps</span></div>
            </div>
            <div class="col-span-3">
              <label class="text-[12px] font-semibold text-slate-700 block mb-1">By</label>
              <input id="goal-d" type="date" value="${g.deadline ?? ''}" class="set-input text-[12px]" />
            </div>
          </div>
          <div>
            <label class="text-[12px] font-semibold text-slate-700 block mb-1">Note (optional)</label>
            <textarea id="goal-n" rows="2" placeholder="Why this goal matters / form cue / reminder" class="w-full p-2 border border-slate-200 rounded-lg text-[13px] focus:outline-none focus:border-orange-400">${escapeHtml(g.note || '')}</textarea>
          </div>
        </div>

        <div class="bg-white border-t border-slate-200 px-4 py-3 flex gap-2">
          ${state.goals[exerciseName] ? `<button id="goal-del" class="px-4 py-2.5 rounded-full text-rose-600 hover:bg-rose-50 text-[14px] font-medium">Remove</button>` : ''}
          <button data-close-btn class="flex-1 bg-slate-100 hover:bg-slate-200 rounded-full py-2.5 text-[14px] font-medium text-slate-700">Cancel</button>
          <button id="goal-save" class="flex-1 bg-emerald-600 hover:opacity-90 text-white rounded-full py-2.5 text-[14px] font-medium">Save goal</button>
        </div>
      </div>
    </div>`;

  $modal.querySelectorAll('[data-close-btn]').forEach(b => b.onclick = closeModal);
  $modal.querySelector('[data-close]').onclick = (e) => { if (e.target === e.currentTarget) closeModal(); };

  document.getElementById('goal-save').onclick = () => {
    const w = document.getElementById('goal-w').value.trim();
    const r = document.getElementById('goal-r').value.trim();
    const d = document.getElementById('goal-d').value.trim();
    const n = document.getElementById('goal-n').value.trim();
    if (!w && !r && !n) return closeModal();
    state.goals[exerciseName] = {
      targetWeight: w ? parseFloat(w) : null,
      targetReps:   r ? parseInt(r, 10) : null,
      deadline:     d || null,
      note:         n || null,
    };
    saveGoals();
    closeModal();
    render();
  };

  const delBtn = document.getElementById('goal-del');
  if (delBtn) delBtn.onclick = () => {
    delete state.goals[exerciseName];
    saveGoals();
    closeModal();
    render();
  };

  setTimeout(() => document.getElementById('goal-w')?.focus(), 60);

        <div class="bg-white border-t border-slate-200 px-4 py-3 flex gap-2">
          ${cur ? `<button id="habit-del" class="px-4 py-2.5 rounded-full text-rose-600 hover:bg-rose-50 text-[14px] font-medium">Clear</button>` : ''}
          <button data-close-btn class="flex-1 bg-slate-100 hover:bg-slate-200 rounded-full py-2.5 text-[14px] font-medium text-slate-700">Cancel</button>
          <button id="habit-save" class="flex-1 bg-slate-900 hover:opacity-90 text-white rounded-full py-2.5 text-[14px] font-medium">Save</button>
        </div>
      </div>
    </div>`;

  $modal.querySelectorAll('[data-close-btn]').forEach(b => b.onclick = closeModal);
  $modal.querySelector('[data-close]').onclick = (e) => { if (e.target === e.currentTarget) closeModal(); };

  const save = () => {
    const v = document.getElementById('habit-val').value.trim();
    state.habits[dt] = state.habits[dt] || {};
    if (!v) delete state.habits[dt][key]; else state.habits[dt][key] = v;
    saveHabits();
    closeModal();
    render();
  };
  document.getElementById('habit-save').onclick = save;
  document.getElementById('habit-val').onkeydown = (e) => { if (e.key === 'Enter') save(); };
  const del = document.getElementById('habit-del');
  if (del) del.onclick = () => { document.getElementById('habit-val').value = ''; save(); };

  setTimeout(() => document.getElementById('habit-val')?.focus(), 60);
}

// ---- History modal -----------------------------------------
function renderHistoryModal(exerciseName) {
  const all = state.workouts
    .map(effectiveWorkout)
    .flatMap(w => w.exercises
      .filter(e => e.name === exerciseName && !isResultsEmpty(e.results))
      .map(e => ({ date: w.date, longDate: w.longDate, instructions: e.instructions, results: e.results, notes: e.notes })))
    .sort((a,b) => b.date.localeCompare(a.date));

  $modal.innerHTML = `
    <div class="fixed inset-0 bg-black/40 modal-backdrop z-40 flex items-end md:items-center justify-center" data-close>
      <div class="modal-panel bg-slate-50 w-full md:max-w-md md:rounded-2xl flex flex-col overflow-hidden" style="max-height: 85vh">
        <div class="bg-white px-4 pt-12 pb-4 flex items-center justify-between border-b border-slate-200" style="background: linear-gradient(#ee6f3a 0%, #ee6f3a 48px, white 48px);">
          <div class="w-8"></div>
          <h2 class="font-semibold text-slate-900 text-[17px]">Exercise History</h2>
          <button data-close-btn class="text-slate-500 hover:text-slate-900">${icons.close}</button>
        </div>
        <div class="px-4 py-3 border-b border-slate-200 bg-white">
          <div class="flex items-center gap-2 bg-white border border-slate-300 rounded-full px-4 py-2.5">
            <span class="text-slate-400">${icons.search}</span>
            <span class="flex-1 text-[14px] text-slate-700 truncate">${exerciseName}</span>
          </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-3 scroll-area">
          ${all.length === 0 ? `<div class="text-center text-slate-400 text-sm pt-10">No prior sessions for this exercise.</div>` : all.map(h => `
            <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden">
              <div class="px-4 pt-3 pb-2">
                <div class="flex items-center justify-between">
                  <h3 class="font-semibold text-slate-900 truncate pr-3">${exerciseName.replace(/^ISSA Exercise Library /, '')}</h3>
                  <button data-view-workout="${h.date}" class="text-sky-600 text-[13px] hover:underline shrink-0">View Workout</button>
                </div>
                <div class="text-[13px] font-medium text-slate-800 mt-1.5">${h.longDate}</div>
                <pre class="text-[13px] text-slate-400 mt-2 whitespace-pre-wrap font-sans">${h.instructions}</pre>
              </div>
              <div class="bg-slate-50 px-4 py-3 border-t border-slate-100 text-[13px] text-slate-700">
                <pre class="whitespace-pre-wrap font-sans">${formatResultsList(h.results)}</pre>
                ${h.notes ? `<div class="text-[12px] text-slate-500 mt-1.5">Notes: ${escapeHtml(h.notes)}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;

  $modal.querySelectorAll('[data-close-btn]').forEach(b => b.onclick = closeModal);
  $modal.querySelector('[data-close]').onclick = (e) => { if (e.target === e.currentTarget) closeModal(); };
  $modal.querySelectorAll('[data-view-workout]').forEach(b => b.onclick = () => {
    const date = b.dataset.viewWorkout;
    const w = state.workouts.find(x => x.date === date && x.exercises.some(e => e.name === exerciseName));
    if (w) { state.selectedWorkoutId = w.id; closeModal(); render(); }
  });
}

// ---- Comments modal ----------------------------------------
function renderCommentsModal(workoutId) {
  const w = getWorkoutById(workoutId);
  const comments = w.comments || [];

  $modal.innerHTML = `
    <div class="fixed inset-0 bg-black/40 modal-backdrop z-40 flex items-end md:items-center justify-center" data-close>
      <div class="modal-panel bg-slate-50 w-full md:max-w-md md:rounded-2xl flex flex-col overflow-hidden" style="height: 85vh; max-height: 85vh">
        <div class="bg-white px-4 pt-12 pb-4 flex items-center justify-between border-b border-slate-200" style="background: linear-gradient(#c1542a 0%, #c1542a 48px, white 48px);">
          <div class="w-8"></div>
          <h2 class="font-semibold text-slate-900 text-[17px]">Workout Comments</h2>
          <button data-close-btn class="text-slate-500 hover:text-slate-900">${icons.close}</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 scroll-area ${comments.length === 0 ? 'flex items-center justify-center' : 'space-y-2'}">
          ${comments.length === 0 ? emptyComments() : comments.map(c => commentBubble(c)).join('')}
        </div>
        <div class="bg-white border-t border-slate-200 px-3 py-3 flex items-center gap-2">
          <button class="w-9 h-9 flex items-center justify-center text-slate-400 hover:text-slate-600">${icons.camera}</button>
          <input id="comment-input" type="text" placeholder="Add Comment" class="flex-1 bg-slate-100 border border-slate-200 rounded-full px-4 py-2.5 text-[14px] focus:outline-none focus:ring-2 ring-brand" />
          <button id="comment-send" class="w-9 h-9 rounded-full bg-slate-300 hover:bg-slate-700 flex items-center justify-center">${icons.send}</button>
        </div>
      </div>
    </div>`;

  $modal.querySelectorAll('[data-close-btn]').forEach(b => b.onclick = closeModal);
  $modal.querySelector('[data-close]').onclick = (e) => { if (e.target === e.currentTarget) closeModal(); };
  const input = document.getElementById('comment-input');
  const send = () => {
    const text = input.value.trim();
    if (!text) return;
    setOverride(workoutId, o => {
      o.comments = o.comments || [];
      o.comments.push({ text, ts: new Date().toISOString(), author: 'Nick' });
    });
    render();
  };
  document.getElementById('comment-send').onclick = send;
  input.onkeydown = (e) => { if (e.key === 'Enter') send(); };
  input.focus();
}

function emptyComments() {
  return `
    <div class="space-y-3 opacity-50">
      <div class="bg-white rounded-2xl px-4 py-3 max-w-[80%]"><div class="h-2 w-32 bg-slate-200 rounded mb-2"></div><div class="h-2 w-44 bg-slate-200 rounded"></div></div>
      <div class="bg-white rounded-2xl px-4 py-3 max-w-[80%] ml-auto"><div class="h-2 w-28 bg-slate-200 rounded mb-2 ml-auto"></div><div class="h-2 w-40 bg-slate-200 rounded ml-auto"></div></div>
      <div class="bg-white rounded-2xl px-4 py-3 max-w-[80%]"><div class="h-2 w-36 bg-slate-200 rounded mb-2"></div><div class="h-2 w-32 bg-slate-200 rounded"></div></div>
      <div class="text-center text-slate-400 font-semibold text-[15px] pt-2">No comments on this workout</div>
    </div>`;
}

function commentBubble(c) {
  const isMe = c.author === 'Nick';
  const time = new Date(c.ts).toLocaleString('en-GB', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
  return `
    <div class="flex ${isMe ? 'justify-end' : ''}">
      <div class="${isMe ? 'bg-orange-500 text-white' : 'bg-white text-slate-900'} rounded-2xl px-4 py-2 max-w-[80%]">
        <div class="text-[14px] leading-snug">${escapeHtml(c.text)}</div>
        <div class="text-[10px] ${isMe ? 'text-white/70' : 'text-slate-400'} mt-1">${time}</div>
      </div>
    </div>`;
}

// ============================================================
// Utilities
// ============================================================
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

function bindNav() {
  $app.querySelectorAll('[data-nav]').forEach(b => b.onclick = () => {
    state.view = b.dataset.nav;
    state.selectedWorkoutId = null;
    render();
  });
}

// ============================================================
// Boot
// ============================================================
(async function boot() {
  if (state.cloud.enabled && state.cloud.url && state.cloud.anonKey && state.cloud.userEmail) {
    try { await doCloudSync('pull'); } catch (e) { /* fall through */ }
  }
  render();
})();
</script>
</body>
</html>
